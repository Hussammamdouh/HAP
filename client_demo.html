<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>East Projects — Design Programme Control Board</title>
<style>
:root{
  --field:#0b1d2e; --field2:#0e2438; --panel:#13293e; --panel2:#16314f;
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
  --ink:#eaf1f8; --ink2:#aebfd1; --mut:#7e95ab;
  --teal:#34c6a6; --teal-dim:#1f7a5e;
  --r:#ff5a5f; --r-bg:rgba(255,90,95,.13);
  --a:#f1a73a; --a-bg:rgba(241,167,58,.13);
  --g:#46c08a; --g-bg:rgba(70,192,138,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--field);
  color:var(--ink);
  font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  overflow:hidden;
  font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;
}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
#stage{position:fixed;inset:0;display:flex;flex-direction:column}

/* ---------- top bar ---------- */
.topbar{
  flex:0 0 auto;height:9.2vh;min-height:64px;
  display:flex;align-items:center;gap:1.4vw;
  padding:0 2.2vw;
  background:linear-gradient(180deg,var(--field2),var(--field));
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:1.1vw}
.brand img{height:5.1vh;min-height:34px;width:auto;display:block;opacity:.96}
.brand .div{width:1px;height:4.4vh;background:var(--line2)}
.brand .eyebrow{font-size:clamp(10px,1.05vw,15px);letter-spacing:.32em;color:var(--teal);font-weight:600;text-transform:uppercase}
.brand .eyebrow b{display:block;color:var(--ink2);letter-spacing:.18em;font-weight:500;margin-top:2px;font-size:.82em}
.spacer{flex:1 1 auto}
.clock{text-align:right;line-height:1.15}
.clock .d{font-size:clamp(13px,1.25vw,19px);font-weight:600;color:var(--ink)}
.clock .t{font-size:clamp(10px,.95vw,13px);color:var(--mut);letter-spacing:.06em}
.fresh{font-size:clamp(9px,.9vw,13px);color:var(--mut);text-align:right;line-height:1.25;margin-right:.6vw}
.fresh b{color:var(--teal);font-weight:600}

/* ---------- slide frame ---------- */
.slidewrap{flex:1 1 auto;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;padding:2.0vh 2.2vw 1.2vh;display:flex;flex-direction:column;
  opacity:0;transform:translateY(14px);pointer-events:none;
  transition:opacity .5s ease,transform .5s ease}
.slide.on{opacity:1;transform:none;pointer-events:auto}
.reduce .slide{transition:none}

.slide-head{display:flex;align-items:flex-end;gap:1.2vw;margin-bottom:1.4vh}
.slide-head .tag{font-size:clamp(11px,1.0vw,14px);letter-spacing:.26em;color:var(--teal);font-weight:600;text-transform:uppercase}
.slide-head h1{font-size:clamp(20px,2.5vw,40px);font-weight:700;letter-spacing:-.01em;line-height:1}
.slide-head .sub{color:var(--mut);font-size:clamp(11px,1.0vw,15px);margin-bottom:.25em}
.slide-head .pagebadge{font-size:clamp(11px,1.0vw,15px);font-weight:700;color:var(--teal);background:rgba(52,198,166,.12);border:1px solid rgba(52,198,166,.38);padding:.3vh .8vw;border-radius:999px;align-self:center;letter-spacing:.02em}

/* ---------- KPI strip ---------- */
.kpis{display:grid;gap:1.0vw;margin-bottom:1.6vh}
.kpis.p{grid-template-columns:auto repeat(4,1fr)}
.kpis.s{grid-template-columns:repeat(5,1fr)}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.5vh 1.2vw;
  display:flex;flex-direction:column;justify-content:center;min-height:9.2vh}
.kpi .lab{font-size:clamp(9px,.85vw,12px);letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:.5vh}
.kpi .val{font-size:clamp(22px,2.7vw,42px);font-weight:700;line-height:1}
.kpi .val small{font-size:.42em;font-weight:600;color:var(--ink2);margin-left:.25em}
.kpi.alarm .val{color:var(--r)}
.kpi.ok .val{color:var(--g)}
.kpi .foot{font-size:clamp(9px,.82vw,12px);color:var(--mut);margin-top:.5vh}
.kpi .foot b{color:var(--ink2);font-weight:600}
.kpi .foot .late{color:var(--r)}
.kpi .foot .early{color:var(--g)}

/* donut */
.donut{flex:0 0 auto;display:flex;align-items:center;gap:1.1vw;background:var(--panel2);
  border:1px solid var(--line);border-radius:14px;padding:1.2vh 1.5vw;min-width:13vw}
.ring{position:relative;--p:0;width:8.6vh;height:8.6vh;min-width:56px;min-height:56px;border-radius:50%;
  background:conic-gradient(var(--teal) calc(var(--p)*1%), rgba(255,255,255,.10) 0);
  display:grid;place-items:center;flex:0 0 auto}
.ring::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6.4vh;height:6.4vh;min-width:40px;min-height:40px;border-radius:50%;background:var(--panel2)}
.ring span{position:relative;font-size:clamp(15px,1.7vw,26px);font-weight:700}
.donut .meta .lab{font-size:clamp(9px,.85vw,12px);letter-spacing:.16em;text-transform:uppercase;color:var(--mut)}
.donut .meta .big{font-size:clamp(16px,1.7vw,26px);font-weight:700;margin-top:.3vh}

/* ---------- worklist (the board) ---------- */
.board{flex:1 1 auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;
  display:flex;flex-direction:column;overflow:hidden}
.board .bh{display:flex;align-items:center;justify-content:space-between;padding:1.3vh 1.4vw;border-bottom:1px solid var(--line)}
.board .bh .t{font-size:clamp(12px,1.15vw,17px);font-weight:700;letter-spacing:.02em}
.board .bh .t span{color:var(--mut);font-weight:500;margin-left:.6vw}
.board .bh .legend{display:flex;gap:1.1vw;font-size:clamp(9px,.82vw,12px);color:var(--mut)}
.board .bh .legend i{display:inline-block;width:.7em;height:.7em;border-radius:50%;margin-right:.4em;vertical-align:baseline}
.tablewrap{flex:1 1 auto;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;background:var(--panel2);z-index:2;
  font-size:clamp(9px,.82vw,12px);letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);
  font-weight:600;text-align:left;padding:1.0vh 1.0vw;border-bottom:1px solid var(--line2);white-space:nowrap}
tbody td{padding:.95vh 1.0vw;border-bottom:1px solid var(--line);font-size:clamp(11px,1.06vw,16px);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.od{background:var(--r-bg)}
tbody tr.od td:first-child{box-shadow:inset 3px 0 0 var(--r)}
td.idx{color:var(--mut);font-size:.82em;width:2.2vw;text-align:right}
td.stage{font-weight:600;max-width:0;width:26%}
td.stage .ph{display:block;color:var(--mut);font-weight:500;font-size:.78em;margin-top:.2vh;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td.scope{color:var(--ink2);white-space:nowrap}
td.owner{font-weight:600;white-space:nowrap}
td.cons{color:var(--ink2);white-space:nowrap}
td.date{color:var(--ink2);white-space:nowrap;font-variant-numeric:tabular-nums}
td.status .st{font-size:.78em;letter-spacing:.04em;color:var(--ink2)}
td.days{text-align:right;white-space:nowrap}
.pill{display:inline-block;min-width:6.0vw;text-align:center;padding:.5vh .8vw;border-radius:999px;
  font-weight:700;font-size:.96em;font-variant-numeric:tabular-nums}
.pill.r{color:var(--r);background:var(--r-bg);box-shadow:inset 0 0 0 1px rgba(255,90,95,.35)}
.pill.a{color:var(--a);background:var(--a-bg);box-shadow:inset 0 0 0 1px rgba(241,167,58,.35)}
.pill.g{color:var(--g);background:var(--g-bg);box-shadow:inset 0 0 0 1px rgba(70,192,138,.32)}
.empty{padding:6vh 2vw;text-align:center;color:var(--mut);font-size:clamp(13px,1.2vw,18px)}

/* ---------- summary by-project table ---------- */
.sumtable{flex:1 1 auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.sumtable .bh{padding:1.3vh 1.4vw;border-bottom:1px solid var(--line);font-size:clamp(12px,1.15vw,17px);font-weight:700}
.sumtable table td{font-size:clamp(12px,1.15vw,17px);padding:1.5vh 1.0vw}
.proj{display:flex;align-items:center;gap:.7vw;font-weight:700;font-size:clamp(13px,1.25vw,19px)}
.dot{width:.85em;height:.85em;border-radius:50%;flex:0 0 auto}
.dot.r{background:var(--r)}.dot.a{background:var(--a)}.dot.g{background:var(--g)}
.bar{position:relative;height:1.5vh;min-height:9px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden;min-width:9vw}
.bar i{position:absolute;left:0;top:0;bottom:0;border-radius:999px;background:linear-gradient(90deg,var(--teal-dim),var(--teal))}
.bar b{position:absolute;right:.5vw;top:50%;transform:translateY(-50%);font-size:.74em;font-weight:700;color:var(--ink)}
td.num{text-align:right;font-variant-numeric:tabular-nums}
td.over b{color:var(--r)}
.var .late{color:var(--r);font-weight:700}.var .early{color:var(--g);font-weight:700}.var .on{color:var(--ink2)}
.portfolio-row td{background:var(--panel2);font-weight:700;border-top:1px solid var(--line2)}

/* ---------- footer / controls ---------- */
.footer{flex:0 0 auto;height:5.6vh;min-height:42px;display:flex;align-items:center;gap:1.2vw;
  padding:0 2.2vw;border-top:1px solid var(--line);background:var(--field2)}
.cycle{flex:1 1 auto;height:4px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden}
.cycle i{display:block;height:100%;width:0;background:var(--teal);border-radius:999px}
.dots{display:flex;gap:.7vw}
.dots button{all:unset;cursor:pointer;width:.85vw;height:.85vw;min-width:9px;min-height:9px;border-radius:50%;
  background:rgba(255,255,255,.22);transition:background .25s,transform .25s}
.dots button.on{background:var(--teal);transform:scale(1.25)}
.dots button:focus-visible{outline:2px solid var(--teal);outline-offset:3px}
.ctrl{display:flex;align-items:center;gap:.5vw}
.ctrl button{all:unset;cursor:pointer;width:3.2vh;height:3.2vh;min-width:26px;min-height:26px;border-radius:8px;
  display:grid;place-items:center;color:var(--ink2);background:rgba(255,255,255,.06)}
.ctrl button:hover{background:rgba(255,255,255,.12);color:var(--ink)}
.ctrl button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
.ctrl svg{width:1.5vh;height:1.5vh;min-width:13px;min-height:13px;fill:currentColor}
.pgname{font-size:clamp(10px,.95vw,13px);color:var(--mut);letter-spacing:.04em;min-width:8vw}
.pgname b{color:var(--ink2)}
@media (max-width:760px){
  .kpis.p,.kpis.s{grid-template-columns:repeat(2,1fr)}
  .donut{grid-column:1 / -1}
  td.cons,td.scope,thead th.cons,thead th.scope{display:none}
}
</style>
</head>

  <div class="topbar">

</div>
